<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二手车竞价撮合工具</title>
<script src="https://public.jssdk.cn/tcb-sdk/1.10.9/tcb.js"></script>
<script>
// 备用 SDK（如果主 SDK 加载失败则使用）
if (typeof tcb === 'undefined') {
  document.write('<script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.9/tcb.js"><\/script>');
}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px;line-height:1.6}
.app{max-width:960px;margin:0 auto;padding:16px}
.header{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;border:0.5px solid #e0e0e0}
.header .h1{font-size:17px;font-weight:500;color:#1a1a1a}
.header .sub{font-size:12px;color:#888;margin-top:2px}
.badge{background:#fff3e0;color:#e65100;font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:7px 16px;border-radius:8px;border:0.5px solid #ddd;background:#fff;cursor:pointer;font-size:13px;color:#666;transition:all .15s}
.tab.active{background:#1976d2;color:#fff;border-color:#1976d2}
.page{display:none}.page.active{display:block}
.form-card{background:#fff;border-radius:12px;padding:20px;border:0.5px solid #e0e0e0;margin-bottom:12px}
.form-card h2{font-size:14px;font-weight:500;margin-bottom:14px;color:#333;display:flex;align-items:center;gap:6px}
.form-card h2::before{content:'';display:inline-block;width:3px;height:14px;background:#1976d2;border-radius:2px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.form-item{display:flex;flex-direction:column;gap:4px}
.form-item label{font-size:12px;color:#888}
.form-item input,.form-item select,.form-item textarea{padding:7px 10px;border:0.5px solid #ddd;border-radius:7px;font-size:13px;outline:none;background:#fafafa;color:#1a1a1a;transition:border .15s}
.form-item input:focus,.form-item select:focus,.form-item textarea:focus{border-color:#1976d2;background:#fff}
.form-item textarea{resize:vertical;min-height:72px}
.photo-area{border:1px dashed #ccc;border-radius:8px;padding:16px;text-align:center;cursor:pointer;color:#aaa;font-size:12px;min-height:70px;display:flex;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden}
.photo-area:hover{border-color:#1976d2;color:#1976d2}
.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.photo-thumb{width:72px;height:72px;border-radius:6px;object-fit:cover;border:0.5px solid #e0e0e0}
.btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:#1976d2;color:#fff}
.btn-primary:hover{background:#1565c0}
.btn-outline{background:#fff;border:0.5px solid #1976d2;color:#1976d2}
.btn-outline:hover{background:#e3f2fd}
.btn-danger{background:#fff;border:0.5px solid #e53935;color:#e53935}
.btn-sm{padding:5px 12px;font-size:12px}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.car-list{display:flex;flex-direction:column;gap:10px}
.car-card{background:#fff;border-radius:12px;padding:16px;border:0.5px solid #e0e0e0;cursor:pointer;transition:border-color .15s}
.car-card:hover{border-color:#1976d2}
.car-top{display:flex;justify-content:space-between;align-items:flex-start}
.car-title{font-size:15px;font-weight:500;color:#1a1a1a}
.car-meta{font-size:12px;color:#888;margin-top:3px}
.car-status{font-size:11px;padding:3px 8px;border-radius:5px;font-weight:500}
.status-open{background:#e8f5e9;color:#2e7d32}
.status-closed{background:#ffebee;color:#c62828}
.bid-count{font-size:12px;color:#1976d2;margin-top:4px}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{background:#f5f5f5;border-radius:4px;padding:2px 7px;font-size:11px;color:#666}
.tag.green{background:#e8f5e9;color:#2e7d32}
.tag.blue{background:#e3f2fd;color:#1565c0}
.tag.amber{background:#fff8e1;color:#b45309}
.bid-list{display:flex;flex-direction:column;gap:8px}
.bid-item{background:#fff;border-radius:10px;padding:12px 16px;border:0.5px solid #e0e0e0;display:flex;align-items:center;gap:12px}
.bid-rank{width:28px;height:28px;border-radius:50%;background:#e3f2fd;color:#1565c0;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bid-rank.first{background:#fff3e0;color:#e65100}
.bid-info{flex:1}
.bid-dealer{font-size:13px;font-weight:500}
.bid-time{font-size:11px;color:#aaa}
.bid-price{font-size:17px;font-weight:500;color:#e53935}
.bid-note{font-size:12px;color:#888;margin-top:2px}
.empty{text-align:center;padding:40px 0;color:#bbb;font-size:13px}
.bid-form-card{background:#fff;border-radius:12px;padding:20px;border:0.5px solid #e0e0e0}
.car-info-header{background:#e3f2fd;border-radius:10px;padding:14px 16px;margin-bottom:16px}
.car-info-header .name{font-size:16px;font-weight:500;color:#0d47a1}
.car-info-header .detail{font-size:12px;color:#555;margin-top:4px;line-height:1.8}
.price-input-wrap{position:relative;margin-top:8px}
.price-input-wrap .yuan{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:#888}
.price-input-wrap input{padding-left:28px;font-size:18px;font-weight:500}
.once-tip{font-size:11px;color:#e53935;margin-top:6px}
.submit-row{margin-top:16px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:90%;max-width:440px}
.modal h3{font-size:15px;font-weight:500;margin-bottom:14px}
.modal p{font-size:13px;color:#555;margin-top:6px}
.share-link{background:#f5f5f5;border-radius:7px;padding:8px 12px;font-size:12px;color:#555;word-break:break-all;margin-bottom:12px;font-family:monospace}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:10px;padding:14px;border:0.5px solid #e0e0e0;text-align:center}
.stat-num{font-size:24px;font-weight:500;color:#1976d2}
.stat-label{font-size:12px;color:#888;margin-top:2px}
.dealer-page{display:none;position:fixed;inset:0;background:#f5f5f5;z-index:200;overflow-y:auto;padding:20px}
.dealer-page.show{display:block}
.dealer-inner{max-width:480px;margin:0 auto}
.win-card{background:#e8f5e9;border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.win-price{font-size:18px;font-weight:500;color:#2e7d32}
.lock-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center}
.lock-overlay.show{display:flex}
.lock-card{background:#fff;border-radius:14px;padding:28px;width:90%;max-width:380px;text-align:center}
.lock-card h3{font-size:15px;font-weight:500;margin-bottom:16px;color:#333}
.lock-card input{width:100%;padding:10px 14px;border:0.5px solid #ddd;border-radius:8px;font-size:15px;text-align:center;outline:none;margin-bottom:12px}
.lock-card input:focus{border-color:#1976d2}
.lock-card .hint{font-size:12px;color:#aaa;margin-bottom:16px}
.success-card{background:#fff;border-radius:14px;padding:24px;width:90%;max-width:420px;text-align:center}
.success-card h3{font-size:16px;font-weight:500;color:#2e7d32;margin-bottom:6px}
.success-card .car-name{font-size:14px;color:#333;margin-bottom:16px}
.success-card .price-big{font-size:28px;font-weight:500;color:#e53935;margin:12px 0}
.success-card .info-row{font-size:13px;color:#555;margin-top:6px}
.success-card .info-row span{font-weight:500}
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- 主应用 -->
<div class="app" id="mainApp">
  <div class="header">
    <div>
      <div class="h1">二手车竞价撮合</div>
      <div class="sub">评估师专用 · 车商一次出价 · 云端数据同步</div>
    </div>
    <span class="badge">评估师模式</span>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="publish">发布车源</div>
    <div class="tab" data-tab="carlist">车源列表</div>
    <div class="tab" data-tab="bids">出价汇总</div>
  </div>

  <!-- 发布车源 -->
  <div class="page active" id="page-publish">
    <div class="form-card">
      <h2>车辆基本信息</h2>
      <div class="form-grid">
        <div class="form-item">
          <label>品牌 / 车型</label>
          <input type="text" id="f-model" placeholder="如：丰田凯美瑞 2.5G 精英版">
        </div>
        <div class="form-item">
          <label>年款</label>
          <input type="text" id="f-year" placeholder="如：2020款">
        </div>
        <div class="form-item">
          <label>表显里程（万公里）</label>
          <input type="number" id="f-mileage" placeholder="如：5.8" step="0.1">
        </div>
        <div class="form-item">
          <label>变速箱</label>
          <select id="f-gearbox">
            <option value="">请选择</option>
            <option>自动</option>
            <option>手动</option>
          </select>
        </div>
        <div class="form-item">
          <label>颜色</label>
          <input type="text" id="f-color" placeholder="如：珍珠白">
        </div>
        <div class="form-item">
          <label>上牌地</label>
          <input type="text" id="f-region" placeholder="如：上海">
        </div>
        <div class="form-item">
          <label>过户次数</label>
          <select id="f-transfer">
            <option value="">请选择</option>
            <option>0次（原车主）</option>
            <option>1次</option>
            <option>2次</option>
            <option>3次及以上</option>
          </select>
        </div>
        <div class="form-item">
          <label>车主报价（可选）</label>
          <input type="number" id="f-askprice" placeholder="车主期望价（元）">
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>车况评估（你的专业判断）</h2>
      <div class="form-grid">
        <div class="form-item">
          <label>发动机状况</label>
          <select id="f-engine">
            <option value="">请选择</option>
            <option>原厂无漏无渗</option>
            <option>轻微渗油</option>
            <option>有拆卸</option>
          </select>
        </div>
        <div class="form-item">
          <label>变速箱状况</label>
          <select id="f-trans">
            <option value="">请选择</option>
            <option>正常无异响</option>
            <option>有拆卸</option>
          </select>
        </div>
        <div class="form-item">
          <label>内饰状况</label>
          <select id="f-interior">
            <option value="">请选择</option>
            <option>九成新无破损</option>
            <option>正常磨损</option>
            <option>有明显破损</option>
            <option>改装/翻新</option>
          </select>
        </div>
        <div class="form-item">
          <label>轮胎状况</label>
          <select id="f-tire">
            <option value="">请选择</option>
            <option>新胎（5成以上）</option>
            <option>正常（3-5成）</option>
            <option>需更换</option>
          </select>
        </div>
        <div class="form-item">
          <label>年检 / 保险到期</label>
          <input type="text" id="f-inspect" placeholder="如：年检到2025.12">
        </div>
      </div>
      <div class="form-item" style="margin-top:12px">
        <label>评估备注（重要情况说明）</label>
        <textarea id="f-remark" placeholder="例：右后门有小补漆约10cm，不影响结构；方向机曾更换；有完整保养记录..."></textarea>
      </div>
    </div>

    <div class="form-card">
      <h2>拍照上传（可选）</h2>
      <div class="photo-area" onclick="document.getElementById('photoInput').click()">
        <span>+ 点击添加车辆照片</span>
        <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)">
      </div>
      <div class="photo-preview" id="photoPreview"></div>
    </div>

    <div class="form-card">
      <h2>竞价规则设置</h2>
      <div class="form-grid">
        <div class="form-item">
          <label>最低出价（元）</label>
          <input type="number" id="f-minprice" placeholder="低于此价自动屏蔽">
        </div>
        <div class="form-item">
          <label>竞价截止时间</label>
          <input type="datetime-local" id="f-deadline">
        </div>
        <div class="form-item">
          <label>车源所在城市</label>
          <input type="text" id="f-city" placeholder="如：上海闵行">
        </div>
        <div class="form-item">
          <label>是否显示车主报价</label>
          <select id="f-showask">
            <option value="no">不显示（让车商独立判断）</option>
            <option value="yes">显示参考价</option>
          </select>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="publishCar()">发布并生成竞价链接</button>
      <button class="btn btn-outline" onclick="previewShare()">预览分享卡片</button>
      <button class="btn btn-outline" onclick="clearForm()">清空重填</button>
    </div>
  </div>

  <!-- 车源列表 -->
  <div class="page" id="page-carlist">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="car-list" id="carList"></div>
    <div class="empty" id="carListEmpty">暂无车源，前往"发布车源"添加</div>
  </div>

  <!-- 出价汇总（PIN保护） -->
  <div class="page" id="page-bids">
    <div id="bidsContent">
      <!-- 由 JS 动态填充 -->
    </div>
  </div>
</div>

<!-- 车商出价页 -->
<div class="dealer-page" id="dealerPage">
  <div class="dealer-inner">
    <div class="header" style="margin-bottom:16px">
      <div>
        <div class="h1">车商出价</div>
        <div class="sub">仅可出价一次，请认真填写</div>
      </div>
      <span class="badge" style="background:#e8f5e9;color:#2e7d32">车商模式</span>
    </div>
    <div id="dealerCarInfo"></div>
    <div class="bid-form-card">
      <h2 style="font-size:14px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:6px">
        <span style="display:inline-block;width:3px;height:14px;background:#e53935;border-radius:2px"></span>提交你的收购价
      </h2>
      <div class="form-item">
        <label>您的姓名 / 店名</label>
        <input type="text" id="d-name" placeholder="如：张老板 / 鑫诚二手车">
      </div>
      <div class="form-item" style="margin-top:10px">
        <label>联系电话</label>
        <input type="tel" id="d-phone" placeholder="方便评估师联系您">
      </div>
      <div class="form-item" style="margin-top:10px">
        <label>收购出价（元）</label>
        <div class="price-input-wrap">
          <span class="yuan">¥</span>
          <input type="number" id="d-price" placeholder="输入您的收购价格" style="padding:10px 12px 10px 28px;width:100%;font-size:18px;font-weight:500;border:0.5px solid #ddd;border-radius:8px;outline:none">
        </div>
        <div class="once-tip">⚠ 出价后不可修改，请仔细确认</div>
      </div>
      <div class="form-item" style="margin-top:10px">
        <label>备注（可选）</label>
        <textarea id="d-note" placeholder="如：需要实地验车后确认 / 可以上门看车..."></textarea>
      </div>
      <div class="submit-row">
        <button class="btn btn-primary" style="width:100%;padding:12px" onclick="submitBid()">确认提交出价（不可修改）</button>
      </div>
    </div>
    <div style="margin-top:12px;text-align:center">
      <button class="btn btn-outline btn-sm" onclick="closeDealerPage()">返回</button>
    </div>
  </div>
</div>

<!-- 分享弹窗 -->
<div class="modal-overlay" id="shareModal">
  <div class="modal">
    <h3>分享竞价链接</h3>
    <div id="shareCardContent"></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">关闭</button>
      <button class="btn btn-primary btn-sm" onclick="copyShareLink()">复制链接文字</button>
    </div>
  </div>
</div>

<!-- PIN 解锁弹窗 -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-card">
    <h3 id="lockTitle">输入管理密码</h3>
    <input type="password" id="lockInput" maxlength="20" placeholder="请输入密码" onkeydown="if(event.key==='Enter')checkPin()">
    <p class="hint" id="lockHint">出价汇总仅管理员可见</p>
    <button class="btn btn-primary" style="width:100%" onclick="checkPin()">确认</button>
  </div>
</div>

<!-- 车商出价成功页 -->
<div class="lock-overlay" id="successOverlay">
  <div class="success-card">
    <h3>出价成功</h3>
    <div class="car-name" id="successCarName"></div>
    <div class="price-big" id="successPrice"></div>
    <div class="info-row">出价人：<span id="successDealer"></span></div>
    <div class="info-row">联系电话：<span id="successPhone"></span></div>
    <div class="info-row" id="successNoteRow">备注：<span id="successNote"></span></div>
    <p style="font-size:12px;color:#888;margin-top:16px;line-height:1.8">评估师确认后会主动联系您<br>请保持电话畅通，感谢参与</p>
    <button class="btn btn-primary" style="margin-top:16px;width:100%" onclick="closeSuccess()">关闭</button>
  </div>
</div>

<script>
// ===== 腾讯云开发 CloudBase 初始化 =====
const ENV_ID = 'cloud1-2gn73lp4d5857ea5';
let db;
let cars = [];
let bids = {};
let adminPin = localStorage.getItem('admin_pin_v2') || '';
let isUnlocked = false;
let pendingTab = null;
let currentDealerCarId = null;
let uploadedPhotos = [];
let initRetryCount = 0;
const MAX_INIT_RETRIES = 3;

// 等待 SDK 加载
function waitForSDK(timeout = 10000) {
  return new Promise((resolve, reject) => {
    const start = Date.now();
    const check = () => {
      if (typeof tcb !== 'undefined') {
        resolve(true);
      } else if (Date.now() - start > timeout) {
        reject(new Error('SDK 加载超时'));
      } else {
        setTimeout(check, 100);
      }
    };
    check();
  });
}

// 初始化 CloudBase
async function initCloudBase() {
  try {
    // 先等待 SDK 加载
    console.log('等待 CloudBase SDK 加载...');
    await waitForSDK();
    console.log('SDK 加载成功，初始化 CloudBase...');
    
    const app = tcb.init({ env: ENV_ID });
    console.log('正在匿名登录...');
    await app.auth().signInAnonymously();
    db = app.database();
    console.log('CloudBase 初始化成功');
    
    // 初始化完成后加载数据
    await loadCarsFromCloud();
    // 检查 URL 参数
    checkUrlParams();
    // 检查 PIN 设置
    checkPinSetup();
  } catch (e) {
    console.error('CloudBase 初始化失败:', e);
    initRetryCount++;
    
    if (initRetryCount < MAX_INIT_RETRIES) {
      console.log(`正在重试 (${initRetryCount}/${MAX_INIT_RETRIES})...`);
      setTimeout(initCloudBase, 2000);
    } else {
      alert('云端连接失败，请检查网络后刷新页面（F5）\n\n错误信息: ' + e.message);
    }
  }
}

// ===== 从云端加载车源和出价 =====
async function loadCarsFromCloud() {
  try {
    if (!db) {
      console.error('数据库对象未初始化');
      return;
    }
    
    console.log('正在加载车源数据...');
    const res = await db.collection('cars').orderBy('createdAt', 'desc').get();
    cars = res.data || [];
    console.log(`加载了 ${cars.length} 条车源`);
    
    // 加载所有出价
    bids = {};
    for (const car of cars) {
      try {
        const bidRes = await db.collection('bids').where({ carId: car.id }).get();
        bids[car.id] = bidRes.data || [];
      } catch (bidError) {
        console.error('加载出价失败:', bidError);
        bids[car.id] = [];
      }
    }
    renderCarList();
    console.log('数据加载完成');
  } catch (e) {
    console.error('加载数据失败:', e);
    // 即使加载失败也显示空列表
    cars = [];
    bids = {};
    renderCarList();
  }
}

// ===== PIN 设置与验证 =====
function checkPinSetup() {
  if (!adminPin) {
    const title = document.getElementById('lockTitle');
    const hint = document.getElementById('lockHint');
    const btn = document.querySelector('#lockOverlay .btn-primary');
    title.textContent = '首次使用，请设置管理密码';
    hint.textContent = '用于保护出价汇总信息，遗忘后无法找回，请牢记';
    btn.textContent = '确认设置';
    btn.onclick = setPin;
    document.getElementById('lockInput').onkeydown = function(e){if(e.key==='Enter')setPin()};
    document.getElementById('lockOverlay').classList.add('show');
  }
}

function setPin(){
  const val = document.getElementById('lockInput').value.trim();
  if(val.length < 4){alert('密码至少4位');return;}
  adminPin = val;
  localStorage.setItem('admin_pin_v2', adminPin);
  document.getElementById('lockOverlay').classList.remove('show');
  isUnlocked = true;
}

function checkPin(){
  const val = document.getElementById('lockInput').value.trim();
  if(val === adminPin){
    document.getElementById('lockOverlay').classList.remove('show');
    isUnlocked = true;
    if(pendingTab){
      document.getElementById('lockInput').value = '';
      switchTab(pendingTab);
      pendingTab = null;
    }
  } else {
    alert('密码错误');
    document.getElementById('lockInput').value = '';
    document.getElementById('lockInput').focus();
  }
}

// ===== Tab 切换 =====
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    const target = t.dataset.tab;
    if(target==='bids' && !isUnlocked){
      pendingTab = target;
      document.getElementById('lockInput').value = '';
      document.getElementById('lockTitle').textContent = '输入管理密码';
      document.getElementById('lockHint').textContent = '出价汇总仅管理员可见';

    }
    switchTab(target);

});

function switchTab(tabName){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-tab="'+tabName+'"]').classList.add('active');
  document.getElementById('page-'+tabName).classList.add('active');
  if(tabName==='carlist') renderCarList();

function buildShareText(car){

  let txt = `【竞价车源】${car.model}\n`;
  txt += `年款：${car.year||'—'} | 里程：${car.mileage?car.mileage+'万公里':'—'}\n`;
  txt += `颜色：${car.color||'—'} | 变速箱：${car.gearbox||'—'}\n`;
  txt += `上牌地：${car.region||'—'} | 过户：${car.transfer||'—'}\n`;

async function loadBids(){
  const sel = document.getElementById('bidCarSelect');
  if(!sel) return;
  const id = sel.value;
  const container = document.getElementById('bidListContainer');
  const summary = document.getElementById('bidSummary');
  const empty = document.getElementById('bidEmpty');
  if(!id){container.innerHTML='';summary.innerHTML='';empty.style.display='block';return;}
  const car = cars.find(c=>c.id===id);
  // 从云端重新加载出价
  try {
    const res = await db.collection('bids').where({ carId: id }).orderBy('price', 'desc').get();
    bids[id] = res.data || [];
  } catch(e) {
    console.error('加载出价失败:', e);
  }
  const carBids = (bids[id]||[]);
  empty.style.display='none';

  if(!carBids.length){
    container.innerHTML='<div class="empty">暂无出价，分享链接等车商出价</div>';
    summary.innerHTML=`<div class="car-info-header" style="margin-bottom:12px"><div class="name">${car.model}</div><div class="detail">暂无出价 · ${car.status==='open'?'竞价进行中':'已结束'}</div></div>`;
    summary.insertAdjacentHTML('beforeend',`<button class="btn btn-outline btn-sm" onclick="showShare(cars.find(c=>c.id==='${id}'))">重新分享</button>`);
    return;
  }

  const top = carBids[0];
  const avg = Math.round(carBids.reduce((s,b)=>s+Number(b.price),0)/carBids.length);
  summary.innerHTML = `
    <div class="car-info-header" style="margin-bottom:12px">
      <div class="name">${car.model}</div>
      <div class="detail">${car.year||''} ${car.mileage?'· '+car.mileage+'万公里':''}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">
      <div class="stat-card"><div class="stat-num" style="color:#e53935">¥${Number(top.price).toLocaleString()}</div><div class="stat-label">最高出价</div></div>
      <div class="stat-card"><div class="stat-num">¥${avg.toLocaleString()}</div><div class="stat-label">平均出价</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#2e7d32">${carBids.length}</div><div class="stat-label">出价车商</div></div>
    </div>
    <div class="win-card">
      <div><div style="font-size:13px;font-weight:500;color:#1b5e20">最高出价方</div><div style="font-size:12px;color:#555;margin-top:2px">${top.dealer} · ${top.phone}</div>${top.note?`<div style="font-size:11px;color:#888;margin-top:2px">${top.note}</div>`:''}</div>
      <div class="win-price">¥${Number(top.price).toLocaleString()}</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="confirmDeal('${id}','${top.dealer}',${top.price})">确认成交最高价</button>
      <button class="btn btn-outline btn-sm" onclick="openDealerPage('${id}')">模拟车商出价</button>
      <button class="btn btn-danger btn-sm" onclick="closeBidding('${id}')">关闭竞价</button>
    </div>
  `;

  container.innerHTML = carBids.map((b,i)=>`
    <div class="bid-item">
      <div class="bid-rank ${i===0?'first':''}">${i+1}</div>
      <div class="bid-info">
        <div class="bid-dealer">${b.dealer}</div>
        <div class="bid-time">${b.phone} · ${b.time}</div>
        ${b.note?`<div class="bid-note">${b.note}</div>`:''}
      </div>
      <div class="bid-price">¥${Number(b.price).toLocaleString()}</div>
    </div>
  `).join('');
}

async function confirmDeal(carId, dealer, price){
  if(!confirm(`确认以 ¥${Number(price).toLocaleString()} 与 ${dealer} 成交？`))return;
  const car = cars.find(c=>c.id===carId);
  if(car){car.status='closed';car.dealDealer=dealer;car.dealPrice=price;}
  try {
    await db.collection('cars').doc(carId).update({ status: 'closed', dealDealer: dealer, dealPrice: price });
    await loadCarsFromCloud();
    alert(`已记录成交！\n车辆：${car.model}\n成交方：${dealer}\n成交价：¥${Number(price).toLocaleString()}\n\n请联系车商线下完成交易。`);
    renderBidsPage();
    setTimeout(()=>{ const sel = document.getElementById('bidCarSelect'); if(sel) sel.value = carId; loadBids(); }, 100);
  } catch(e) {
    console.error('确认成交失败:', e);
    alert('操作失败，请重试');
  }
}

async function closeBidding(id){
  if(!confirm('确认关闭此车源的竞价？'))return;
  const car = cars.find(c=>c.id===id);
  if(car){car.status='closed';}
  try {
    await db.collection('cars').doc(id).update({ status: 'closed' });
    await loadCarsFromCloud();
    renderBidsPage();
  } catch(e) {
    console.error('关闭竞价失败:', e);
  }
}

function exportBids(){
  const id = document.getElementById('bidCarSelect').value;
  if(!id){alert('请先选择车源');return;}
  const car = cars.find(c=>c.id===id);
  const carBids = (bids[id]||[]).slice().sort((a,b)=>Number(b.price)-Number(a.price));
  if(!carBids.length){alert('暂无出价数据');return;}
  let csv = '排名,车商姓名,联系电话,出价(元),备注,出价时间\n';
  carBids.forEach((b,i)=>{csv+=`${i+1},${b.dealer},${b.phone},${b.price},"${b.note||''}",${b.time}\n`});
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `出价汇总_${car.model}_${new Date().toLocaleDateString('zh-CN')}.csv`;
  a.click();
}

    if(note){
      document.getElementById('successNote').textContent = note;
      document.getElementById('successNoteRow').style.display='block';document.getElementById('successNoteRow')styledisplay='block';
    } else {
      document.getElementById('successNoteRow').style.display='none';document.getElementById('successNoteRow')styledisplay='none';
    }
    document.getElementById('successOverlay').classList.add('show');
  } catch(e) {
    console.error('提交出价失败:', e);
    alert('提交失败，请重试');
  }
}

// ===== URL参数（车商扫码入口）=====
function checkUrlParams(){
  const params = new URLSearchParams(location.search);
  const bidId = params.get('bid');
  if(bidId){
    openDealerPage(bidId);
  }
}

// ===== 页面加载后初始化 =====
window.addEventListener('DOMContentLoaded', initCloudBase);
</script>
